databases:
  - name: smartsync-db
    databaseName: smartsync
    user: smartsync
    plan: free

services:
  - type: web
    name: smartsync
    runtime: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn smartsync.wsgi:application"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartsync-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SECURE_SSL_REDIRECT
        value: "True"
